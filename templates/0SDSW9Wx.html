<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>卡密验证</title>
        <style>
            * {
                padding: 0;
                margin: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                    Roboto, sans-serif;
            }

            /* 卡密验证界面 */
            #auth-overlay {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(
                    135deg,
                    #1a1a2e 0%,
                    #16213e 50%,
                    #0f3460 100%
                );
            }
            .auth-card {
                background: rgba(255, 255, 255, 0.08);
                -webkit-backdrop-filter: blur(12px);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 16px;
                padding: 40px 36px;
                width: 380px;
                text-align: center;
                color: #fff;
            }
            .auth-card h2 {
                font-size: 22px;
                margin-bottom: 8px;
            }
            .auth-card p {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.6);
                margin-bottom: 28px;
            }
            .auth-card input {
                width: 100%;
                padding: 12px 16px;
                font-size: 15px;
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.1);
                color: #fff;
                outline: none;
                transition: border-color 0.2s;
            }
            .auth-card input::placeholder {
                color: rgba(255, 255, 255, 0.4);
            }
            .auth-card input:focus {
                border-color: #e94560;
            }
            .auth-card button {
                margin-top: 18px;
                width: 100%;
                padding: 12px;
                font-size: 15px;
                font-weight: 600;
                color: #fff;
                background: #e94560;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.2s;
            }
            .auth-card button:hover {
                background: #c73650;
            }
            .auth-error {
                margin-top: 12px;
                font-size: 13px;
                color: #ff6b6b;
                min-height: 18px;
            }

            /* iframe 容器 */
            #content-frame {
                display: none;
                width: 100%;
                height: 100%;
            }
            #content-frame iframe {
                width: 100%;
                height: 100%;
                border: none;
            }
        </style>
    </head>
    <body>
        <!-- 卡密验证界面 -->
        <div id="auth-overlay">
            <div class="auth-card">
                <h2>🔑 卡密验证</h2>
                <p>请输入您的卡密以继续访问</p>
                <input
                    type="text"
                    id="key-input"
                    placeholder="请输入卡密"
                    autocomplete="off"
                />
                <button id="verify-btn">验 证</button>
                <div class="auth-error" id="error-msg"></div>
            </div>
        </div>

        <!-- 代理内容区 -->
        <div id="content-frame">
            <iframe
                src="https://www.bkdau.cn/game/elaile/ver/0616/web/index.html?tiaoguocode=1&tiaoshi=1&lang=zh&noloadzip=1&abTag=V22B&bufayu=0&code=6J9TY"
                allowfullscreen
            ></iframe>
        </div>

        <script>
            const overlay = document.getElementById('auth-overlay')
            const content = document.getElementById('content-frame')
            const input = document.getElementById('key-input')
            const btn = document.getElementById('verify-btn')
            const errorMsg = document.getElementById('error-msg')

            function verify() {
                const key = input.value.trim()
                if (!key) {
                    errorMsg.textContent = '请输入卡密'
                    input.focus()
                    return
                }
                // 验证通过：隐藏卡密界面，显示 iframe
                overlay.style.display = 'none'
                content.style.display = 'block'
            }

            btn.addEventListener('click', verify)
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') verify()
            })

            // 自动聚焦输入框
            input.focus()
        </script>
    </body>
</html>
